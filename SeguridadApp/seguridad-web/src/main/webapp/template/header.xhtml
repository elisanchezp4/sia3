<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"

<html lang="en" xmlns="http://www.w3.org/1999/xhtml"

<head>
	<title>Start Page</title>
</head>
<body>
	<ui:composition>
		<h:form id="publicheader">
			<div class="ui-grid ui-grid-responsive">

								<div class="ui-grid-col-3" style="padding-top: 2%; padding-left: 1%;">
									<p:outputLabel id="bannerTitulo1"

										style="margin-top: 30px; margin-left: 10px; font-size: 20px;

								</div>
								<div class="ui-grid-col-9 banner-titulo">
									<p:graphicImage id="bannerLogos"
										style="margin-right: 2%;"
										styleClass="banner-logos"
										value="#{resource['images/logo_mineducacion.png']}" />
								</div>
								
							</div>
						</div>
					</div>
				</div>
				<div class="ui-grid-row">
					<div class="ui-grid-col-9"
						style="padding-left: 5px; padding-right: 5px;">
					</div>

					
				</div>
			</div>
