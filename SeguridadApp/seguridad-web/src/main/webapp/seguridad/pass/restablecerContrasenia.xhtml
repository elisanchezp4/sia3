<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html lang="en" xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:cc="http://java.sun.com/jsp/jstl/core">
<head>
	<title>Start Page</title>
</head>
<h:body>
	<ui:composition template="/template/publicLayout.xhtml">
		<ui:define name="content">
			<h:form id="form1">
					<div class="form-comp" style="padding: 5px; display:table;">
						<br/>
						<div style="display:table-row">
							<div style="display:table-cell">
								<p:outputLabel for="usuarioAsociado" 
									value="#{etq.label_usuarioAsociadoLabel}" style="float:left;"/>
							</div>
							<div style="display:table-cell">
								<p:inputText id="usuarioAsociado"
									value="#{gestionContraseniaBean.usuarioAsociado}"/>
							</div>
							<div style="display:table-cell">
								<p:message for="usuarioAsociado" />
							</div>
						</div>
					</div>
					<br />
					<div>
						<p:commandButton id="btnGuardar" styleClass="ui-button"
							value="#{etq.button_recordar_contrasenia}"
							action="#{gestionContraseniaBean.restablecerContrasenia}"
							update=":#{p:component('form1')}" />
						<p:commandButton id="btnSalir" styleClass="ui-button"
							value="#{etq.button_cancelar}"
							action="#{gestionContraseniaBean.salir}"
							update=":#{p:component('form1')}" immediate="true"/>
					</div>
					<br/>
					<p:dialog showEffect="fade" hideEffect="fade" id="activar"
						widgetVar="activaDialog" header="etq.title_confirmacion}">
						<p:outputLabel id="mimensaAC" value="#{etq.label_errorCargaDominios}" />
						<div>
							<p:commandButton value="Aceptar" styleClass="ui-confirmdialog-si"
								action="#{gestionContraseniaBean.salir}" ajax="false"
								immediate="true" update="activar" />
						</div>
					</p:dialog>
			</h:form>
		</ui:define>
	</ui:composition>
</h:body>
</html>
