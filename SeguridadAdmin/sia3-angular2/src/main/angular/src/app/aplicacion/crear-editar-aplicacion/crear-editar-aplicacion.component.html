<ol class="breadcrumb">
	<li><a routerLink="/inicio/home">Inicio</a></li>
	<li><a routerLink="/aplicacion">Administración de Aplicaciones</a></li>
	<li class="active">Crear/Editar Aplicaciones</li>
  </ol>
  <div class="container dashboard">
	<div class="row">
	  <div *ngIf="aplicacion.aplicacionId" class="col-lg-12">
		<h1 class="page-header">
		  Editar Aplicaciones
		</h1>
	  </div>
	  <div *ngIf="aplicacion.aplicacionId==null" class="col-lg-12">
		<h1 class="page-header">
		  Crear Aplicaciones
		</h1>
	  </div>
	</div>
	<div class="row">
	  <div>
		<p-confirmDialog header="Confirmar" acceptLabel="Si" icon="fa fa-question-circle" width="425"></p-confirmDialog>
		<p-messages [value]="msgs"></p-messages>
	  </div>
	</div>
	<div class="row">
	  <div class="col-md-12 col-xs-12 col-sm-12">
		<div class="panel panel-default boton_absolute">
		  <form>
			<div class="panel-body">
			  <div class="form-group col-md-12">
				<label for="txNombre">Nombre*</label>
				<input type="text" maxlength="100"
					   [ngClass]="{'campo-requerido': validarCampoVacio(aplicacion.nombre) && campoError==true}"
					   [(ngModel)]="aplicacion.nombre" (ngModelChange)="formChange($event)" name="nombre"
					   class="form-control" id="nombre"
					   required placeholder="Nombre de la aplicación"
					   title="Nombre que identifique la aplicación que desea administrar.">
			  </div>

			  <div class="form-group col-md-12">
				<label for="txUrlInicioExitoso">URL de inicio exitoso*</label>
				<input type="text" maxlength="150"
					   [ngClass]="{'campo-requerido':validarCampoVacio(aplicacion.urlInicioExitoso) && campoError==true}"
					   [(ngModel)]="aplicacion.urlInicioExitoso" (ngModelChange)="formChange($event)"
					   name="urlInicioExitoso"
					   title="Ingrese la URL de inicio de la aplicación que desea administrar, la estructura valida de esta URL es http o https, acepta máximo 150 caracteres."
					   class="form-control" id="txUrlInicioExitoso" required
					   placeholder="URL a donde direcciona cuando el inicio a la aplicación es exitoso">
			  </div>
			  <div class="form-group col-md-12">
				<label for="txMinutoVigenciaCodigo">Minutos de vigencia de código de autorización*</label>
				<input type="number" maxlength="2" min="1" step="1"
					   [ngClass]="{'campo-requerido':campoError == true && (aplicacion.minutosVigenciaCodigo == null || aplicacion.minutosVigenciaCodigo.length == 0)}"
					   [(ngModel)]="aplicacion.minutosVigenciaCodigo" (ngModelChange)="formChange($event)"
					   name="minutosVigenciaCodigo"
					   class="form-control" id="minutosVigenciaCodigo" required
					   placeholder="Tiempo en minutos en el que expira el código de la autorización"
					   data-toggle="tooltip" title="El sistema aproxima el valor ingresado">
			  </div>
			  <div class="form-group col-md-12">
				<label for="txMinutoVigenciaToken">Minutos de vigencia de token de aplicación*</label>
				<input type="number" maxlength="2" min="1" step="1" required
					   [ngClass]="{'campo-requerido':campoError == true && (aplicacion.minutosVigenciaToken == null || aplicacion.minutosVigenciaToken.length == 0)}"
					   [(ngModel)]="aplicacion.minutosVigenciaToken" (ngModelChange)="formChange($event)"
					   name="minutosVigenciaToken"
					   class="form-control" id="minutosVigenciaToken" required
					   placeholder="Tiempo en minutos en el que expira el token de la aplicación"
					   data-toggle="tooltip" title="El sistema aproxima el valor ingresado">

			  </div>
			  <div class="form-group col-md-12">
				<label for="txminVigTokenActConstrasenia">Minutos de vigencia para token de cambio de contraseña*</label>
				<input type="number" maxlength="2" min="1" step="1" required
					   [ngClass]="{'campo-requerido':campoError == true && (aplicacion.minVigTokenActConstrasenia == null || aplicacion.minVigTokenActConstrasenia.length == 0)}"
					   [(ngModel)]="aplicacion.minVigTokenActConstrasenia" (ngModelChange)="formChange($event)"
					   name="minVigTokenActConstrasenia"
					   class="form-control" id="minVigTokenActConstrasenia" required
					   placeholder="Tiempo en minutos en el que expira el token de cambio de contraseña"
					   data-toggle="tooltip" title="El sistema aproxima el valor ingresado">

			  </div>
			  <div class="form-group col-md-12">
				<label for="txEstado">Estado*</label>
				<select class="form-control"
						title="Seleccione el estado de la aplicación, tenga en cuenta que si inactiva esta aplicación ningún usuario asociado a la misma podrá ingresar."
						name="estado" id="estado"
						[ngClass]="{'campo-requerido':campoError == true && (aplicacion.estado == 0)}"
						[(ngModel)]="aplicacion.estado"
						(ngModelChange)="formChange($event)">
				  <option value="0">Seleccione Estado</option>
				  <option *ngFor="let estado of estados" value="{{estado.catalogoId}}">{{estado.descripcion}}</option>
				</select>
			  </div>
			  <div class="form-group col-md-12">
				<label for="txEstadoNotificaciones">¿La aplicación cliente desea recibir notificaciones si los usuarios
				  Actualizan Datos?</label>
				<select
				  class="form-control"
				  title="Seleccione el estado de notificacion de aplicación, tenga en cuenta que si inactiva esta aplicacion no recibira mensajes de auditoria."
				  name="recibirNotificacion" id="recibirNotificacion"
				  [(ngModel)]="aplicacion.recibirNotificacion"
				  (ngModelChange)="formChange($event)">
				  <option value="0">Seleccione si desea recibir Notificacion</option>
				  <option *ngFor="let cod of notificacion" value="{{cod.catalogoId}}">{{cod.descripcion}}</option>
				</select>
			  </div>
			</div>
		  </form>
		</div>
		<div class="col-xs-12 grupo_botones">
		  <button type="button" (click)="volver()" class="btn btn-default">Volver</button>
		  <button *ngIf="aplicacion.aplicacionId == null" type="button" (click)="guardar()" class="btn btn-primary"
				  [disabled]="disableGuardar">Guardar
		  </button>
		  <button *ngIf="aplicacion.aplicacionId" type="button" (click)="modificar()" class="btn btn-primary"
				  [disabled]="disableGuardar">Guardar
		  </button>

		</div>
	  </div>
	</div>

  </div>
