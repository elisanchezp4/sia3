<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
		"http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<ui:composition template="/template/publicLayout.xhtml"
	xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:ui="http://java.sun.com/jsf/facelets"
	xmlns:p="http://primefaces.org/ui"
	xmlns:f="http://java.sun.com/jsf/core"
	xmlns:cc="http://java.sun.com/jsp/jstl/core">

		<ui:define name="content">
			<h:form id="form1" action="?" method="POST">
			
						<p:graphicImage height="75px" value="#{resource['images/blank.png']}"></p:graphicImage>
			<h:panelGrid styleClass="loginFormTableMargin" width="10%"
				columns="3">
				<p:graphicImage value="#{resource['images/blank.png']}"></p:graphicImage>
				<p:fieldset legend="Sistema de seguridad" toggleable="false" toggleSpeed="500">
					<h:panelGrid width="100%">
						<h:panelGrid columns="3" columnClasses="labelLogin, value"
							id="restablecerConPnl" styleClass="loginFormTableLeft">
							<p:outputLabel for="usuarioAsociado" 
									value="#{etq.label_usuarioAsociadoLabel}" style="float:left;"/>
							<p:inputText id="usuarioAsociado"
									value="#{recordarContrasenia.usuarioAsociado}"
									maxlength="50" autocomplete="off" required="true" requiredMessage="El nombre de usuario es obligatorio."/>
							<p:message for="usuarioAsociado" style="width:130px" />
						</h:panelGrid>
						<h:panelGrid columns="2" width="400px">
							<p:captcha id="captcha" label="Captcha" tabindex="3" theme="red" language="es" rendered="true" secure="true"  required="true" requiredMessage="Por favor ingrese el captcha para restablecer la contraseña." validatorMessage="El valor de la imagen incorrecto" />
							<p:message for="captcha" style="width:130px" />
						</h:panelGrid>

						<h:panelGrid columns="2" width="400px" styleClass="loginFormTable">
							<p:commandButton id="btnGuardar" styleClass="ui-button"
							value="#{etq.button_recordar_contrasenia}"
							action="#{recordarContrasenia.restablecerContrasenia}"
							title="#{etq.title_button_recordar_contrasenia}"
							ajax="false"
							update="restablecerConPnl"/>
							<p:commandButton id="btnSalir" styleClass="ui-button"
							value="#{etq.button_cancelar}"
							action="#{recordarContrasenia.salir}"
							update=":#{p:component('form1')}" immediate="true"
							title = "#{etq.title_button_cancelar_restablecer}"/>
						</h:panelGrid>
					</h:panelGrid>
				</p:fieldset>
			</h:panelGrid>
			
			
					<br/>
					<p:dialog showEffect="fade" hideEffect="fade" id="activar"
						widgetVar="activaDialog" header="etq.title_confirmacion}">
						<p:outputLabel id="mimensaAC" value="#{etq.label_errorCargaDominios}" />
						<div>
							<p:commandButton value="Aceptar" styleClass="ui-confirmdialog-si"
								action="#{recordarContrasenia.salir}" ajax="false"
								immediate="true" update="activar" />
						</div>
					</p:dialog>
			</h:form>
		</ui:define>
</ui:composition>
