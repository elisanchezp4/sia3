<ol class="breadcrumb">
	<li><a routerLink="/inicio/home">Inicio</a></li>
	<li><a routerLink="/rol">Administración de Roles</a></li>
	<li class="active">Asignar o editar Operaciones</li>
</ol>
<div class="container dashboard">
	<div class="row">
		<div class="col-lg-12">
			<h1 class="page-header">
				Asignar o editar Operaciones
			</h1>
		</div>
	</div>
<div class="row">
  <div>
	<p-confirmDialog header="Confirmar Eliminación" acceptLabel="Si" icon="fa fa-question-circle" width="425"></p-confirmDialog>
    <p-messages [value]="msgs"></p-messages>
  </div>
</div>
  <div class="row">
    <div class="col-xs-12">
      <div class="panel panel-default">
        <div class="panel-body">
          <ul class="ulLeyenda">
            <li>
              <span class="ui-treenode-label ui-corner-all"><span>Leyenda:</span></span>
            </li>
            <li>
              <span class="ui-treenode-icon fa fa-fw fa-folder"></span>
              <span class="ui-treenode-label ui-corner-all"><span>Aplicación</span></span>
            </li>
            <li>
              <span class="ui-treenode-icon fa fa-fw fa fa-caret-square-o-right"></span>
              <span class="ui-treenode-label ui-corner-all"><span>Menú</span></span>
            </li>
            <li>
              <span class="ui-treenode-icon fa fa-fw fa fa-chevron-right"></span>
              <span class="ui-treenode-label ui-corner-all"><span>Submenu</span></span>
            </li>
            <li>
              <span class="ui-treenode-icon fa fa-fw fa fa-long-arrow-right"></span>
              <span class="ui-treenode-label ui-corner-all"><span>vinculo</span></span>
            </li>
            <li>
              <span class="ui-treenode-icon fa fa-fw fa fa-dot-circle-o"></span>
              <span class="ui-treenode-label ui-corner-all"><span>Botón</span></span>
            </li>
          </ul>
        </div>
      </div>
      <div class="panel panel-default boton_absolute">
        <div class="panel-heading">
          <h3 class="panel-title">Operaciones</h3>
        </div>
        <div class="panel-body">
          <p-tree [value]="arbolOperaciones" (onNodeSelect)="formChange($event)" (onNodeUnselect)="formChange($event)" selectionMode="checkbox" [(selection)]="nodosSeleccionados"></p-tree>
        </div>
      </div>
    </div>
    <div class="col-xs-12 grupo_botones">
      <button type="button" class="btn btn-default" (click)="volver()">Volver</button>
      <button type="button" class="btn btn-primary" (click)="guardar()" [disabled]="disableGuardar">Guardar</button>
    </div>
  </div>
