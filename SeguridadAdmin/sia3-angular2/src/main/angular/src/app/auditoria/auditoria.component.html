<ol class="breadcrumb">
	<li><a routerLink="/inicio/home">Inicio</a></li>
	<li class="active">Consultar Auditoria</li>
</ol>
<div class="container dashboard">
	<div class="row">
		<div class="col-lg-12">
			<h1 class="page-header">
				Consultar Auditoría
			</h1>
		</div>
	</div>
	<div class="row">
		<div>
			<p-messages [value]="msgs"></p-messages>
		</div>
		<div>
			<p-messages [value]="msgsCargar"></p-messages>
		</div>
	</div>
	<div class="row">
		<div class="col-md-12 col-xs-12 col-sm-12">
			<div class="panel panel-default">
				<div class="panel-heading">
					<h3 class="panel-title">Parámetros de Consulta</h3>
				</div>
				<div class="panel-body">
					<div class="form-group col-xs-12">
						<div class="form-group col-xs-4">
							<label for="txNombre">Tipo de Evento*</label>
							<select class="form-control" name="evento" id="evento" [ngClass]="{'campo-requerido':campoError == true &&(idEvento == 0)}"
								[(ngModel)]="idEvento">
						 <option value="0">Seleccione Evento</option>
						 <option *ngFor="let evento of tipoEventos" value="{{evento.catalogoId}}" data-toggle="tooltip" title="{{evento.textoAyuda}}">{{evento.descripcion}}</option>
							 </select>
						</div>
						<div class="form-group col-xs-4">
							<label for="txNombre">Fecha Inicio*</label>
							<div class="form-group">
								<p-calendar readonlyInput="true" [ngClass]="{'campo-requerido':campoError == true && fechaInicio == null}" [(ngModel)]="fechaInicio"
									[showIcon]="true" [locale]="es" dateFormat="dd/mm/yy" [monthNavigator]="true" [yearNavigator]="true" yearRange="2013:2033"></p-calendar>
							</div>
						</div>
						<div class="form-group col-xs-4">
							<label for="txNombre">Fecha Fin*</label>

							<div class="form-group">
								<p-calendar readonlyInput="true" [ngClass]="{'campo-requerido':campoError == true && fechaFin == null}" [(ngModel)]="fechaFin"
									[showIcon]="true" [locale]="es" dateFormat="dd/mm/yy" [monthNavigator]="true" [yearNavigator]="true" yearRange="2013:2033"></p-calendar>
							</div>
						</div>
					</div>
          <div class="form-group col-xs-12">
            <div class="form-group col-xs-4">
              <label for="txNombre">Aplicación</label>
              <select class="form-control" name="aplicacionId" id="aplicacionId" [(ngModel)]="aplicacionId" (change)="actualizarBuscarHabilitado()">
                <option value="0" disabled>Seleccione Aplicación</option>
                <option *ngFor="let aplicativo of aplicacionesTemp" value="{{aplicativo.aplicacionId}}">{{aplicativo.nombre}}</option>
              </select>
            </div>
            <div class="form-group col-xs-4">
              <label for="txNombre">Usuario</label>
              <div class="input-group">
                <input type="text" class="form-control disabled-input" name="usuario" id="usuario" [(ngModel)]="nombreUsuario" disabled>
                <div class="input-group-btn">
                  <button class="btn custom-search-button btn-search" [disabled]="!buscarHabilitado" (click)="openModal()">Buscar</button>
                </div>
              </div>
            </div>


						<div class="form-group col-xs-4">
							<label for="txNombre">Campo del directorio activo</label>
							<select class="form-control" name="campoActivo" id="campoActivo" [(ngModel)]="campoActivo">
						 <option value="0" disabled>Seleccione un campo</option>
						 <option *ngFor="let campo of camposDirectorioActivo" value="{{campo}}">{{campo}}</option>
							 </select>
						</div>
					</div>
				</div>
			</div>
			<div class="form-actions">
				<button type="button" class="btn btn-default" (click)="limpiar()">Limpiar</button>
				<button type="button" class="btn btn-primary" id="btnFiltrar" (click)="validarEnviando()">Filtrar</button>
			</div>
		</div>
	</div>
	<div class="row">
		<p-dataTable [value]="auditoria" [rows]="10" [paginator]="true" [responsive]="true" [lazy]="true" [totalRecords]="totalRegistros"
			(onLazyLoad)="cambiarPagina($event)" emptyMessage="No se encontraron datos">
			<p-column field="fechaEvento" header="Fecha Evento"></p-column>
			<p-column field="tipoEvento" header="Tipo Evento" [style]="{'width':'250px'}"></p-column>
			<p-column field="aplicacionId" header="Aplicación"></p-column>
			<p-column field="nombreUsuario" header="Usuario"></p-column>
      <p-column header="Detalle">
        <template let-audi="rowData" pTemplate type="body">
          <div style="word-break: break-all">
            <span *ngIf="audi.detalle != null">{{audi.detalle}}</span>
            <span *ngIf="audi.detalle == null">No tiene</span>
          </div>
        </template>
      </p-column>
			<p-column field="campoDirectorio" header="Campo Activo"></p-column>
		</p-dataTable>

	</div>
	<div class="col-xs-12 grupo_botones">
    <a (click)="generarReporteExcel('EXCEL')"
       (mouseenter)="hovering = true"
       (mouseleave)="hovering = false"
       [ngClass]="{'cursor-pointer': hovering}">
      <em class="fa fa-file-excel-o"></em>Exportar Excel
    </a>
	</div>
</div>
<p-dialog header="Búsqueda de usuarios" [(visible)]="displayModal" width="1200" responsive="true" class="modal_aplicacion" scrollable="true" scrollHeight="300px">
  <div class="col-xs-12">
    <div>
      <p-messages [value]="msgsDialog"></p-messages>
    </div>

    <form>
      <div class="col-md-12 col-xs-12 col-sm-12">
        <div class="panel panel-default">
          <div class="panel-heading">
            <h3 class="panel-title">Buscar usuario</h3>
          </div>
          <div class="panel-body">
            <div class="form-group col-xs-6">
              <label for="txNombre">Nombre de usuario*</label>
              <input type="text" class="form-control" [(ngModel)]="nombreUsuarioModal" id="usuarioModal" name="usuarioModal" [ngModelOptions]="{standalone: true}" placeholder=" Usuario a consultar"
                     [ngClass]="{'campo-requerido':campoError == true && (nombreUsuarioModal == '' || nombreUsuarioModal == null)}"
                     (ngModelChange)="formChange($event)">
            </div>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-default" (click)="limpiarModalUsuario()">Limpiar</button>
          <button type="button" class="btn btn-primary" (click)="consultarUsuarioApp()" [disabled]="disableFiltrar">Filtrar</button>
        </div>
        <hr>
        <p-dataTable class="modal-datatable" [value]="usuarios" [rows]="3" [(selection)]="selectedUsuario" [paginator]="false" [responsive]="true" scrollable="true" scrollHeight="100px" emptyMessage="No se encontraron datos"
                     resizableColumns="true">
          <p-column selectionMode="single" [style]="{'width':'20px'}"></p-column>
          <p-column field="logonName" header="Nombre de usuario" [style]="{'width':'100px'}"></p-column>
        </p-dataTable>
      </div>
    </form>
  </div>
  <p-footer>
    <div class="col-xs-12 grupo_botones">
      <button type="button" class="btn btn-default" (click)="cancelarFiltro()">Salir</button>
      <button type="button" class="btn btn-primary" (click)="seleccionarUsuario(selectedUsuario)">Seleccionar usuario</button>
    </div>
  </p-footer>
</p-dialog>
